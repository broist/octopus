name: octopus

# Volumes: the project is bind-mounted for live editing, but `vendor` and
# `node_modules` live in named volumes — reading tens of thousands of files back
# through a Windows/OneDrive bind mount is what makes things slow.
#
# Frontend: by DEFAULT we serve the compiled production bundle (one JS/CSS file,
# fast, robust). The `assets` service builds it on `up` and exits. The Vite HMR
# dev server is fragile on a OneDrive-synced Windows folder (high-CPU polling,
# occasional crashes), so it is opt-in only:
#     docker compose --profile dev up      # run with hot-reload
# In dev mode Vite writes public/hot and Laravel switches to the dev server.

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: octopus-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/zz-octopus.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    entrypoint: ["/usr/local/bin/octopus-entrypoint.sh"]
    command: ["php-fpm"]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  # Builds the production frontend bundle once, then exits. Removing public/hot
  # makes Laravel serve the compiled assets from public/build.
  assets:
    image: node:20-alpine
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
    command: sh -c "npm install --no-audit --no-fund && npm run build && rm -f public/hot"
    restart: "no"

  # Opt-in hot-reload dev server:  docker compose --profile dev up
  vite:
    image: node:20-alpine
    profiles: ["dev"]
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0"
    environment:
      - CHOKIDAR_USEPOLLING=true

  queue:
    image: octopus-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      - app
    env_file:
      - .env
    entrypoint: [""]
    command: sh -c "until [ -f vendor/autoload.php ]; do sleep 3; done; php artisan queue:work --sleep=1 --tries=3 --max-time=3600"

  scheduler:
    image: octopus-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      - app
    env_file:
      - .env
    entrypoint: [""]
    command: sh -c "until [ -f vendor/autoload.php ]; do sleep 3; done; while true; do php artisan schedule:run --no-interaction; sleep 60; done"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-octopus}
      POSTGRES_USER: ${DB_USERNAME:-octopus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-octopus}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-octopus} -d ${DB_DATABASE:-octopus}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  pgdata:
  redisdata:
  vendor:
  node_modules:
