; Octopus PHP overrides
upload_max_filesize = 128M
post_max_size = 140M
memory_limit = 512M
max_execution_time = 120
date.timezone = Europe/Budapest

; --- OPcache ---
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 30000
; Keep timestamp validation on so code edits are picked up, but don't re-stat
; every file on every request — costly over a bind mount.
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2

; --- realpath cache ---
; Large win on bind-mounted volumes (Docker Desktop on Windows/macOS), where
; each path resolution is an expensive round trip.
realpath_cache_size = 4096k
realpath_cache_ttl = 600
